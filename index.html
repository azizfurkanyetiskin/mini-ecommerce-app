<!DOCTYPE html>
<html>
<head>
  <title>N11 Style Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* HEADER */
    header {
      background: #ff6000;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    input {
      padding: 10px;
      width: 300px;
      border: none;
      border-radius: 6px;
    }

    /* PRODUCTS */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: #ff6000;
      font-size: 20px;
      font-weight: bold;
    }

    button {
      background: #ff6000;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #e65100;
    }

    /* CART */
    .cart {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<header>
  <h1>Mini N11 🛒</h1>
  <input placeholder="Ürün ara..." onkeyup="searchProducts()" id="search">
</header>

<div class="container" id="products"></div>

<div class="cart">
  <h2>Sepet</h2>
  <ul id="cart"></ul>
  <p>Toplam: <span id="total">0</span> TL</p>
</div>

<script>

const products = [
  {name: "Sneakers", price: 350},
  {name: "T-Shirt", price: 180},
  {name: "Kulaklık", price: 650},
  {name: "Çanta", price: 420}
];

let cart = [];

function renderProducts(list = products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p class="price">${p.price} TL</p>
        <button onclick="addToCart(${i})">Sepete Ekle</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  renderCart();
}

function renderCart() {
  let total = 0;
  const list = document.getElementById("cart");
  list.innerHTML = "";

  cart.forEach((item) => {
    total += item.price;
    list.innerHTML += `<li>${item.name} - ${item.price} TL</li>`;
  });

  document.getElementById("total").innerText = total;
}

function searchProducts() {
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  renderProducts(filtered);
}

renderProducts();

</script>

</body>
</html>
