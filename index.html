<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furkan Ytskn Store</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#ff6000;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo {font-size:24px;font-weight:bold;}
.search {padding:10px;width:50%;border:none;border-radius:6px;}
.container {display:grid;grid-template-columns:220px 1fr;gap:20px;padding:20px;}
.sidebar {background:white;padding:15px;border-radius:10px;}
.products {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.card {background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img {width:100%;border-radius:10px;}
.price {color:#ff6000;font-size:20px;font-weight:bold;}
button {background:#ff6000;color:white;border:none;padding:10px;border-radius:6px;margin-top:10px;}
.chat {position:fixed;right:20px;bottom:20px;background:white;width:250px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.chat-header {background:#ff6000;color:white;padding:10px;}
.chat-body {padding:10px;height:150px;overflow:auto;}
</style>
</head>

<body>

<header>
<div class="logo">Furkan Ytskn Store 🛒</div>
<input class="search" placeholder="Ürün ara..." onkeyup="searchProducts()" id="search">
</header>

<div class="container">

<div class="sidebar">
<h3>Kategoriler</h3>
<p onclick="filter('all')">Tüm Ürünler</p>
<p onclick="filter('Elektronik')">Elektronik</p>
<p onclick="filter('Giyim')">Giyim</p>
</div>

<div>
<h2>Furkan Ytskn Store Fırsatları</h2>
<div class="products" id="products"></div>
</div>

</div>

<div class="chat">
<div class="chat-header">Canlı Asistan</div>
<div class="chat-body">Merhaba 👋 yardımcı olabilirim</div>
</div>

<script>

const products = [
{name:"iPhone 15",price:46999,cat:"Elektronik",img:"https://picsum.photos/200?1"},
{name:"Kulaklık",price:650,cat:"Elektronik",img:"https://picsum.photos/200?2"},
{name:"Tişört",price:180,cat:"Giyim",img:"https://picsum.photos/200?3"},
{name:"Ayakkabı",price:899,cat:"Giyim",img:"https://picsum.photos/200?4"}
];

function render(list=products){
let html="";
list.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price} TL</p>
<button>Sepete Ekle</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function filter(cat){
if(cat==="all") return render();
render(products.filter(p=>p.cat===cat));
}

function searchProducts(){
let val=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(val)));
}

render();

</script>

</body>
</html>
