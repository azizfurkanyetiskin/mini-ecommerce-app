<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FurkanHub</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}

header {background:#ff6000;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo {font-size:26px;font-weight:bold;}

.search {padding:10px;width:40%;border:none;border-radius:6px;}

.container {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}

.card {background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img {width:100%;border-radius:10px;}

.price {color:#ff6000;font-size:20px;font-weight:bold;}

button {background:#ff6000;color:white;border:none;padding:10px;border-radius:6px;margin-top:10px;cursor:pointer;}

.cart {background:white;margin:20px;padding:20px;border-radius:10px;}

.support {position:fixed;bottom:20px;right:20px;background:#ff6000;color:white;padding:15px;border-radius:50px;}
</style>
</head>

<body>

<header>
<div class="logo">FurkanHub 🛒</div>
<input class="search" placeholder="Ürün ara..." onkeyup="searchProducts()" id="search">
</header>

<div class="container" id="products"></div>

<div class="cart">
<h2>Sepet</h2>
<ul id="cart"></ul>
<p>Toplam: <span id="total">0</span> TL</p>

<input id="coupon" placeholder="Kupon (FURKAN50)">
<button onclick="applyCoupon()">Uygula</button>
</div>

<button class="support" onclick="alert('Canlı destek yakında!')">💬</button>

<script>

const products = [
{name:"Sneakers",price:350,img:"https://picsum.photos/200?1"},
{name:"T-Shirt",price:180,img:"https://picsum.photos/200?2"},
{name:"Kulaklık",price:650,img:"https://picsum.photos/200?3"},
{name:"Çanta",price:420,img:"https://picsum.photos/200?4"}
];

let cart=[];
let discount=0;

function renderProducts(list=products){
const container=document.getElementById("products");
container.innerHTML="";
list.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price} TL</p>
<button onclick="addToCart(${i})">Sepete Ekle</button>
</div>`;
});
}

function addToCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let total=0;
const list=document.getElementById("cart");
list.innerHTML="";

cart.forEach((item,i)=>{
total+=item.price;
list.innerHTML+=`<li>${item.name} - ${item.price} TL</li>`;
});

total-=discount;
document.getElementById("total").innerText=total;
}

function applyCoupon(){
let code=document.getElementById("coupon").value;

if(code==="FURKAN50"){
discount=50;
alert("50 TL indirim!");
}else{
discount=0;
alert("Geçersiz kod");
}

renderCart();
}

function searchProducts(){
let val=document.getElementById("search").value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
renderProducts(filtered);
}

renderProducts();

</script>

</body>
</html>
